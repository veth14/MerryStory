name: Auto Archive and Retention

on:
  schedule:
    - cron: '0 2 * * *' # daily at 02:00 UTC
  workflow_dispatch: {}

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci
      - name: Validate required secrets
        run: |
          missing=0
          if [ -z "$MONGODB_URI" ]; then
            echo "::error::Missing MONGODB_URI repository secret."
            missing=1
          fi
          if [ -z "$EMAIL_USER" ]; then
            echo "::error::Missing EMAIL_USER repository secret."
            missing=1
          fi
          if [ -z "$EMAIL_PASS" ]; then
            echo "::error::Missing EMAIL_PASS repository secret."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
      - name: Create indexes
        run: npm run create-indexes
      - name: Run auto-archive
        run: npm run auto-archive
      - name: Run pre-delete notifications
        run: npm run predelete-notify
